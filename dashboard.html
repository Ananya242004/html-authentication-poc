<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <title>Dashboard</title>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid">

<span class="navbar-brand">My Dashboard</span>

<a href="index.html" class="btn btn-outline-light">Logout</a>

</div>
</nav>

<!-- Main Content -->
<div class="container mt-5">

<div class="text-center mb-4">
<h2>Welcome, User 👋</h2>
<p class="text-muted">You have successfully logged in</p>
</div>

<!-- Cards Section -->
<div class="row g-4">

<div class="col-md-4">
<div class="card p-3 text-center shadow">
<h5>Profile</h5>
<p>View and update your profile</p>
<button class="btn btn-primary">View</button>
</div>
</div>

<div class="col-md-4">
<div class="card p-3 text-center shadow">
<h5>Settings</h5>
<p>Manage your account settings</p>
<button class="btn btn-warning">Open</button>
</div>
</div>

<div class="col-md-4">
<div class="card p-3 text-center shadow">
<h5>Reports</h5>
<p>Check your activity reports</p>
<button class="btn btn-success">View</button>
</div>
</div>

</div>

</div>

</body>
</html>
