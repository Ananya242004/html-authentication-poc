<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
<div class="container-fluid">

<span class="navbar-brand">My Dashboard</span>

<a href="index.html" class="btn btn-outline-light">Logout</a>

</div>
</nav>

<!-- Main Content -->
<div class="container mt-5">

<div class="text-center mb-4">
<h2>Welcome, User 👋</h2>
<p class="text-muted">You have successfully logged in</p>
</div>

<!-- Cards Section -->
<div class="row g-4">

<!-- Profile -->
<div class="col-md-4">
<div class="card p-4 text-center shadow dashboard-card">
<i class="bi bi-person-circle fs-1 text-primary"></i>
<h5 class="mt-3">Profile</h5>
<p>View and update your profile</p>
<button class="btn btn-primary">View</button>
</div>
</div>

<!-- Settings -->
<div class="col-md-4">
<div class="card p-4 text-center shadow dashboard-card">
<i class="bi bi-gear fs-1 text-warning"></i>
<h5 class="mt-3">Settings</h5>
<p>Manage your account settings</p>
<button class="btn btn-warning">Open</button>
</div>
</div>

<!-- Reports -->
<div class="col-md-4">
<div class="card p-4 text-center shadow dashboard-card">
<i class="bi bi-bar-chart fs-1 text-success"></i>
<h5 class="mt-3">Reports</h5>
<p>Check your activity reports</p>
<button class="btn btn-success">View</button>
</div>
</div>

</div>

</div>

<!-- JS -->
<script>
// Logout confirmation
document.querySelector("a.btn").addEventListener("click", function(e){
    if(!confirm("Are you sure you want to logout?")){
        e.preventDefault();
    }
});
</script>

</body>
</html>
