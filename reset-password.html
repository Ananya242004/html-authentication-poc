<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <title>Reset Password</title>
</head>
<body>

<h1>Reset Password</h1>

<form>
    <label>New Password:</label><br>
   <input type="password" id="newPassword" class="form-control" required><br><br>

    <label>Confirm Password:</label><br>
    <input type="password" id="confirmPassword" class="form-control" required><br><br>

    <a href="index.html">Reset Password</a>
    <button type="button" class="btn btn-success w-100 mt-3" onclick="resetPassword()">
    Update Password
</button>
</form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
function resetPassword(){
let pass1 = document.getElementById("newPassword").value;
let pass2 = document.getElementById("confirmPassword").value;

if(pass1 === "" || pass2 === ""){
alert("Please fill all fields");
return;
}

if(pass1 !== pass2){
alert("Passwords do not match");
return;
}

alert("Password Updated Successfully!");
window.location.href = "index.html";
}
</script>
</body>
</html>
