<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <title>Reset Password</title>
</head>
<body>
<body class="d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4 shadow" style="width:350px; border-radius:15px;">

<h3 class="text-center mb-3">Reset Password</h3>
<form>
<form onsubmit="resetPassword(event)">
<div class="mb-3">
<label class="form-label">New Password</label>
<input type="password" id="newPassword" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Confirm Password</label>
<input type="password" id="confirmPassword" class="form-control" required>
</div>

<button type="submit" class="btn btn-success w-100 mt-3" onclick="resetPassword()">
    Update Password
</button>

</form>
<script>
function resetPassword(event){

event.preventDefault(); // 🚨 VERY IMPORTANT

let pass1 = document.getElementById("newPassword").value;
let pass2 = document.getElementById("confirmPassword").value;

if(pass1 === "" || pass2 === ""){
alert("Please fill all fields");
return;
}

if(pass1 !== pass2){
alert("Passwords do not match");
return;
}

alert("Password Updated Successfully!");
window.location.href = "index.html";
}
</script>
</div>
</body>
</html>
